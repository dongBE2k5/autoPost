name: Build Komeify App (Win & Mac)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

# [FIX 1] Tắt cảnh báo Node.js 20 làm rối mắt
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      # [FIX 2] Đã thêm cờ --onefile vào ngay sau --clean
      run: |
        pyinstaller --clean --onefile --name "Komeify" --windowed --hidden-import docx --copy-metadata imageio --copy-metadata imageio-ffmpeg main.py

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Komeify-Windows-App
        path: dist/Komeify.exe

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Komeify-macOS-App
        # Trên Mac, file app luôn là một thư mục có đuôi .app
        path: dist/Komeify.app