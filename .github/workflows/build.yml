name: Build Komeify App (Nuitka + Inno Setup)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Chỉ tập trung build Windows bản xịn nhất
        os: [windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka zstandard 

    - name: Build with Nuitka
      shell: bash 
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "Bắt đầu build cho Windows bằng Nuitka..."
          # Đã bỏ --onefile để build dạng thư mục
          python -m nuitka \
            --assume-yes-for-downloads \
            --standalone \
            --enable-plugin=pyqt6 \
            --nofollow-import-to=yt_dlp.extractor.lazy_extractors \
            --include-package=yt_dlp \
            --nofollow-import-to=google.genai.types \
            --include-package=google.genai \
            --output-filename=Komeify.exe \
            main.py
        fi

    - name: Compile Inno Setup (Tạo bộ cài đặt)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        echo "Đang cài đặt Inno Setup bằng Chocolatey..."
        choco install innosetup -y
        
        echo "Đang đóng gói file Setup..."
        # Chạy trực tiếp file thực thi của Inno Setup
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Komeify-Windows-Setup
        path: Output/Komeify_Setup_v1.0.exe