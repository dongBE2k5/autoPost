name: Build Komeify App (Nuitka + Inno Setup)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Build Windows bản xịn nhất và macOS cả 2 kiến trúc (Intel & Apple Silicon)
        os: [windows-latest, macos-13, macos-14]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka zstandard 

    - name: Build with Nuitka
      shell: bash 
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
            echo "Bắt đầu build cho Windows bằng Nuitka (Dùng Clang)..."
            python -m nuitka \
              --assume-yes-for-downloads \
              --standalone \
              --enable-plugin=pyside6 \
              --nofollow-import-to=yt_dlp.extractor.lazy_extractors \
              --include-package=yt_dlp \
              --clang \
              --disable-console \
              --output-filename=Komeify.exe \
              main.py
        elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "Bắt đầu build cho macOS bằng Nuitka..."
            export MACOSX_DEPLOYMENT_TARGET="13.0"
            export CFLAGS="-mmacosx-version-min=13.0"
            python -m nuitka \
              --assume-yes-for-downloads \
              --standalone \
              --enable-plugin=pyside6 \
              --nofollow-import-to=yt_dlp.extractor.lazy_extractors \
              --include-package=yt_dlp \
              --macos-create-app-bundle \
              --macos-app-name="Komeify" \
              --output-filename=Komeify \
              --disable-console \
              main.py
        fi

    - name: Compile Inno Setup (Tạo bộ cài đặt)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        echo "Đang cài đặt Inno Setup bằng Chocolatey..."
        choco install innosetup -y
        
        echo "Đang đóng gói file Setup..."
        # Chạy trực tiếp file thực thi của Inno Setup
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Komeify-Windows-Setup
        path: Output/Komeify_Setup_v1.0.exe

    - name: Create DMG File (Tạo bộ cài đặt macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        echo "Đang cấu hình Info.plist để yêu cầu macOS tối thiểu là 13.0..."
        /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 13.0" Komeify.app/Contents/Info.plist || /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 13.0" Komeify.app/Contents/Info.plist
        
        echo "Đang đóng gói Komeify.app thành file .dmg..."
        mkdir -p Output

        # Đặt tên file theo kiến trúc CPU để không bị trùng
        if [ "$RUNNER_ARCH" == "ARM64" ]; then
          SUFFIX="AppleSilicon"
        else
          SUFFIX="Intel"
        fi

        hdiutil create -volname "Komeify" -srcfolder "Komeify.app" -ov -format UDZO "Output/Komeify_macOS_${SUFFIX}.dmg"
        
        # Lưu biến môi trường để bước Upload có thể dùng
        echo "DMG_NAME=Komeify_macOS_${SUFFIX}.dmg" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=Komeify-macOS-${SUFFIX}-DMG" >> $GITHUB_ENV
        
    - name: Upload macOS Artifact
      if: startsWith(matrix.os, 'macos')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: Output/${{ env.DMG_NAME }}