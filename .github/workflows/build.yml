name: Build Komeify App (Nuitka - High Security)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # BẮT BUỘC cài thêm zstandard để Nuitka có thể nén file thành Onefile
        pip install nuitka zstandard 

    - name: Build with Nuitka
      # Dùng shell bash để chạy lệnh if-else cho cả Windows và Mac
      shell: bash 
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "Bắt đầu build cho Windows..."
          python -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=pyqt6 \
            --windows-console-mode=disable \
            --output-filename=Komeify.exe \
            main.py
            
        elif [ "$RUNNER_OS" == "macOS" ]; then
          echo "Bắt đầu build cho macOS..."
          python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --enable-plugin=pyqt6 \
            --macos-app-name="Komeify" \
            --output-filename=Komeify \
            main.py
        fi

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Komeify-Windows-Secure-Exe
        path: Komeify.exe

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Komeify-macOS-Secure-App
        path: Komeify.app